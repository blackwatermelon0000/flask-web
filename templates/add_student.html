{% extends "base.html" %}
{% block title %}Add Student{% endblock %}
{% block content %}
<div class="form-container">
    <h2>Add New Student</h2>
    <p>Capture the essentials to keep every record complete and searchable.</p>
    <form method="POST" action="{{ url_for('add_student') }}">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter student name" required>
        </div>
        <div class="form-group">
            <label for="roll_no">Roll Number</label>
            <input type="text" id="roll_no" name="roll_no" placeholder="e.g. CS-101" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="student@example.com" required>
        </div>
        <div class="form-group">
            <label for="course">Course</label>
            <input type="text" id="course" name="course" placeholder="e.g. Computer Science" required>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="submit-student-btn">Add Student</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
