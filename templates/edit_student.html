{% extends "base.html" %}
{% block title %}Edit Student{% endblock %}
{% block content %}
<div class="form-container">
	<h2>Edit Student</h2>
	<p>Update details to keep records accurate and current.</p>
	<form method="POST" action="{{ url_for('edit_student', student_id=student.id) }}">
		<div class="form-group">
			<label for="name">Full Name</label>
			<input type="text" id="name" name="name" value="{{ student.name }}" required>
		</div>
		<div class="form-group">
			<label for="roll_no">Roll Number</label>
			<input type="text" id="roll_no" value="{{ student.roll_no }}" disabled>
		</div>
		<div class="form-group">
			<label for="email">Email</label>
			<input type="email" id="email" name="email" value="{{ student.email }}" required>
		</div>
		<div class="form-group">
			<label for="course">Course</label>
			<input type="text" id="course" name="course" value="{{ student.course }}" required>
		</div>
		<div class="form-actions">
			<button type="submit" class="btn btn-primary" id="save-edit-btn">Save Changes</button>
			<a href="{{ url_for('dashboard') }}" class="btn btn-ghost">Cancel</a>
		</div>
	</form>
</div>
{% endblock %}
