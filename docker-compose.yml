version: '3.8'
services:
  web:
    build: .
    ports:
      - "5000:5000"
    command: python app.py
    volumes:
      - .:/app

  tests:
    build: .
    depends_on:
      - web
    command: >
      bash -c "sleep 5 &&
               python -m pytest tests/test_student_app.py -v
               --junit-xml=test-results/results.xml"
    volumes:
      - .:/app
    environment:
      - BASE_URL=http://web:5000